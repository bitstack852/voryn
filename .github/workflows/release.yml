name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Stage 1: Validate ─────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install OpenSSL dev
        run: sudo apt-get install -y libssl-dev

      - name: Rust format
        run: cargo fmt --all

      - name: Rust lint
        run: cargo clippy --workspace -- -W warnings

      - name: Rust tests
        run: cargo test --workspace --verbose

  # ── Stage 2: Build Android ────────────────────────────────────
  build-android:
    name: Build Android
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust for Android
        run: |
          cargo ndk -t aarch64-linux-android build --release -p voryn-core
        env:
          # SQLCipher needs OpenSSL — use the NDK's built-in crypto
          SQLCIPHER_LIB_DIR: ${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android
          OPENSSL_DIR: /usr
          OPENSSL_INCLUDE_DIR: /usr/include
        continue-on-error: true

  # ── Stage 2: Build iOS ────────────────────────────────────────
  build-ios:
    name: Build iOS
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      - uses: Swatinem/rust-cache@v2

      - name: Install libsodium
        run: brew install libsodium

      - name: Build Rust for iOS (device only)
        run: cargo build --release --target aarch64-apple-ios -p voryn-core
        env:
          SODIUM_USE_PKG_CONFIG: 1
        continue-on-error: true

  # ── Stage 3: Publish GitHub Release ───────────────────────────
  publish:
    name: Publish Release
    needs: [build-android, build-ios]
    if: always() && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Voryn ${{ github.ref_name }}
          body: |
            ## Voryn ${{ github.ref_name }}

            Rust core libraries — validate stage passed.
            Cross-compilation for mobile targets is in progress.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
