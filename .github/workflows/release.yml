name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: ""

jobs:
  # ── Stage 1: Validate ─────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Rust format
        run: cargo fmt --all

      - name: Rust lint
        run: cargo clippy --workspace -- -W warnings

      - name: Rust tests
        run: cargo test --workspace --verbose

  # ── Stage 2: Build Android ────────────────────────────────────
  build-android:
    name: Build Android
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust for Android
        run: |
          cargo ndk \
            -t aarch64-linux-android \
            -t armv7-linux-androideabi \
            -t x86_64-linux-android \
            -t i686-linux-android \
            build --release -p voryn-core

  # ── Stage 2: Build iOS ────────────────────────────────────────
  build-ios:
    name: Build iOS
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - uses: Swatinem/rust-cache@v2

      - name: Build Rust for iOS
        run: |
          cargo build --release --target aarch64-apple-ios -p voryn-core
          cargo build --release --target aarch64-apple-ios-sim -p voryn-core

  # ── Stage 3: Publish GitHub Release ───────────────────────────
  publish:
    name: Publish Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Voryn ${{ github.ref_name }}
          body: |
            ## Voryn ${{ github.ref_name }}

            Rust core libraries compiled successfully for Android (4 targets) and iOS (2 targets).

            Full APK builds will be available once React Native project is initialized.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
