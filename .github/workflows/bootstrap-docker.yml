name: Bootstrap Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'crates/voryn-bootstrap/**'
      - 'crates/voryn-network/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deploy/coolify/Dockerfile.bootstrap'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/voryn-bootstrap

jobs:
  build-and-push:
    name: Build & Push Bootstrap Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/coolify/Dockerfile.bootstrap
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
