# Voryn Update Server — nginx configuration
# Serves version.json and signed APK releases over HTTPS
#
# Install: sudo cp nginx.conf /etc/nginx/sites-available/voryn-updates
#          sudo ln -s /etc/nginx/sites-available/voryn-updates /etc/nginx/sites-enabled/
#          sudo certbot --nginx -d updates.voryn.app
#          sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name updates.voryn.app;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name updates.voryn.app;

    # TLS (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/updates.voryn.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/updates.voryn.app/privkey.pem;

    # Strong TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # CORS (allow app to fetch version.json)
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD" always;

    # Document root
    root /var/www/voryn-updates;
    index index.html;

    # version.json — short cache for quick update detection
    location = /version.json {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    # APK releases — long cache (immutable files)
    location /releases/ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";

        # Only allow APK and hash downloads
        location ~ \.(apk|sha256)$ {
            try_files $uri =404;
        }

        # Block everything else
        return 403;
    }

    # Block all other paths
    location / {
        return 404;
    }

    # Logging
    access_log /var/log/nginx/voryn-updates-access.log;
    error_log /var/log/nginx/voryn-updates-error.log warn;
}
